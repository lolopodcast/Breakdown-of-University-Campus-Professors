m1_nav:"1. 學習方法論",m1_title:"學習方法論的對決",
m1_p1:"教育的起點是一個古老的問題：「你要我釣魚給你，還是教你釣魚？」這句話出自經典諺語「授人以魚，不如授人以漁」——給人一條魚只能飽一餐，教人釣魚才能一輩子不餓。但在 AI 時代，答案更進一步：AI 先給你魚吃著，同時教你怎麼釣，甚至幫你重新設計整個漁業系統。這個問題引出學習方法論中四組關鍵對比：SDL vs TBL、PBL vs PjBL。每一組都不是二選一，而是理解各自角色後組合成動態互補的學習系統。",
m1_p2:"「SDL 是引擎，TBL 是加速器。沒有 SDL 能力的人進入 TBL，會變成搭便車的乘客——依賴別人討論、抄別人答案，表面參與實際什麼都沒學到。反過來，只有 SDL 沒有 TBL，容易陷入認知盲點的迴聲室——你以為自己懂了，其實只是在自己的理解裡打轉。團隊的價值在於暴露你的認知盲區：當別人觀點跟你不同，你才被迫重新審視自己的理解。」",
m1_p3:"PBL（Problem-Based Learning）像醫生看診——面對症狀複雜的病人，抽絲剝繭找病因，過程就是學習，不一定要產出成品。起源於醫學教育。PjBL（Project-Based Learning）像建築師蓋房——從設計到施工交出真正的建築，培養規劃執行、團隊協作、時間管理、溝通展示的能力。最強學習設計是用 PBL 精神啟動探究（真實問題激發動機），再用 PjBL 架構落地產出。",
m1_p4:"SDL 和 TBL 形成增強循環：自主學習→團隊碰撞→發現不足→回去自學→再驗證。循環越快學習越深。TBL 第一步是個人測驗——檢驗 SDL 品質。SDL 是 TBL 的前提：你得先有料，團隊討論才有品質。一個有強大 SDL 的人就算沒有團隊也能持續成長；沒有 SDL 的人放進再好的團隊也只是湊人數。",
m1_p5:"使用 AI 應用重要還是製作 AI 應用重要？對絕大多數人來說學會使用遠比製作重要。理由一：不是每個人都需要當 AI 工程師，但幾乎每個人都需要跟 AI 協作。理由二：AI 工具發展方向就是讓製作越來越接近使用——界線正在模糊。理由三：核心能力是提問與判斷——不管使用還是製作，最關鍵的是你能不能問對問題、判斷 AI 產出品質。最務實的路徑：先學會用、用到精熟、自然想動手做。使用是地基，製作是上面蓋的樓。如果你已經很會使用 AI，再往製作邁進一步，你的能力會產生乘數效應——不只能解決自己的問題，還能為一群人打造解決方案。",

m2_nav:"2. 教學場域與體驗",m2_title:"教學場域與生命體驗",
m2_p1:"學習不只發生在方法論中，更發生在特定的場域裡。翻轉教室把傳統「課堂講授＋回家練習」顛倒——課前透過影片教材自學，課堂做討論練習應用。本質是重新分配時間，把面對面留給高層次互動。傳統課堂最大浪費：老師花大量時間講學生自己能懂的東西，真正需要引導的高階思考被擠到課後。翻轉教室修正了這個錯位。",
m2_p2:"「翻轉教室是優化的游泳池——先看教學影片到了泳池直接練習，教練旁邊即時指導。場域實習是把你丟進大海——海浪、水溫、暗流都是泳池沒有的變數。Tell me and I forget, show me and I remember, involve me and I understand。場域實習就是最徹底的 involve。」",
m2_p3:"場域實習把學習者送進真實工作場域——醫院、學校、企業、社區——在實際情境中操作觀察反思。再好的課堂都是模擬，真實世界的複雜度、不確定性、人際互動、情緒壓力教室模擬不出。場域實習解決「知行落差」——把知道轉化為做到。翻轉和場域是上下游：翻轉是優化準備，場域是不可替代的實戰。",
m2_p4:"實習垂直深化專業——在專業環境做真實工作，建立產業技能、發展人脈、測試職涯方向。你學到的不只是技能，更是對產業從內部觀察才看得見的運作邏輯：辦公室政治、客戶管理、有真實後果的截止日期，以及學術知識和職場執行之間的落差。交換留學水平拓展視野——在不同學術文化環境中，當所有習以為常的東西突然不管用（語言、食物、社會規範、幽默感），你被迫重建假設。這種認知重構是交換獨有的價值。",
m2_p5:"理想路徑：先交換打開視野、建立適應力、磨利語言，然後實習運用國際經驗。交換給你鏡片（lens）看見更寬世界，實習給你槓桿（leverage）撬動職業機會。這整套場域體驗串起一條完整學習旅程：翻轉教室在方法論層面優化課堂效率；場域實習在實踐層面讓知識接受檢驗；實習在專業層面鍛造職業身份；交換在人生層面重構認知架構。它們不是各自獨立的，而是一條從教室到世界的成長路徑。",

// M3
m3_nav:"3. 教學與 AI 融入",m3_title:"教學責任與 AI 融入",
m3_p1:"創新教學重要還是把課教好教滿重要？對大多數老師來說，把課教好教滿比追求創新教學重要得多。理由一：創新不等於有效——很多所謂創新教學花了三節課做分組活動，熱鬧非凡但回頭考試基本概念一塌糊塗，這是用形式取代內容。理由二：紮實教學本身就不簡單——把課講清楚有條理、讓不同程度學生都聽懂、評量精準到位——這些基本功做到極致本身就是高超專業。理由三：創新需要以紮實為前提——你得先知道什麼該教、教到什麼程度，才有資格談用不同方式去教。",
m3_p2:"「創新的正確定位，是『教好』的升級版，不是替代品。一個老師如果課都教不滿、教不清楚，就急著去翻轉、去 PBL，那是在沙灘上蓋城堡。學生最需要的，永遠是一個講得清楚、教得扎實的老師，而不是方法很潮但內容撐不住的老師。先求教好教滿，再求教得更巧——這個順序不能顛倒。」",
m3_p3:"傳統創新教學法（翻轉、PBL、TBL、PjBL、合作學習、差異化教學、鷹架理論等）是教學的「作業系統」——提供學習設計的底層邏輯：為什麼要問題驅動？為什麼先自學再討論？為什麼在真實情境中練習？這些原理來自幾十年認知科學和教育心理學研究，不會因為 AI 出現就失效。人腦建構知識的方式沒有因為 AI 而改變。",
m3_p4:"AI 是新裝上的強大「硬體」——讓原本受限的教學設計有了全新可能。SDL + AI：AI 學伴讓自學有即時對話、追問、客製化解釋，不再只是看影片讀課本。TBL + AI：討論前先跟 AI 辯論觀點，帶更成熟想法進團隊，AI 當第三方觀點打破迷思。PBL + AI：快速蒐集資料、生成假設、模擬方案，時間留給高層次分析判斷。翻轉 + AI：課前 AI 即時答疑，課堂 AI 即時掌握每位學生理解狀況。",
m3_p5:"但沒有教學法底層邏輯的 AI 融入會出大問題。不懂 PBL 設計原理就叫學生「去問 ChatGPT 然後交報告」，那不是 AI 融入，是把教學外包給 AI。不懂鷹架理論就無法判斷 AI 應該介入到什麼程度——用太多學生失去認知挑戰，用太少浪費工具潛力。傳統教學法是根，AI 是翅膀。根不穩，翅膀讓你摔更快；根扎深，翅膀帶你飛到從前到不了的地方。先教好再教巧，這個原則在 AI 時代不但沒過時，反而更加重要。",

// M4
m4_nav:"4. 校園的未來",m4_title:"校園與教室的未來",
m4_p1:"EMI（English as a Medium of Instruction）是老師用英語教學科內容，EML（English as a Medium of Learning）把視角翻轉到學生端——學習者如何透過英語建構知識。EMI 只關注「老師用英語教」，容易落入陷阱——老師講了英語但學生沒學進去。EML 把焦點放回學習者：學生真的透過英語在學習嗎？EMI 是手段，EML 是目的。沒有 EML 意識的 EMI，是老師自己講英文的獨角戲。最理想是以 EML 為導向設計 EMI 課堂。",
m4_p2:"「當 AI 融入 EML 後，EMI 從『必需品』變成『奢侈品』。AI 打開了實現 EML 的其他管道——學生透過 AI 自主建構英語學習環境，不再完全依賴老師英語授課。該把力氣花在確保每個學生都能 EML（用 AI 大幅降低門檻），而不是要求每個老師都能 EMI（勉強用英語教反而犧牲學科深度）。高品質 EMI 依然是頂級學習體驗，但不再是每間教室都必須勉強複製的標配。」",
m4_p3:"用 PBL 驅動、PjBL 產出，AI 融入 SDL 加線上 TBL，接軌場域實習——這套系統組裝後，教室傳統功能被逐一替代。但教室有一個功能是系統裡唯一的結構性空缺：「儀式性的共在」。身體共處創造的學習張力線上無法複製——你坐在對面看見對方皺眉那一秒的認知衝突、一個眼神一個嘆氣一個沉默，這些微訊號在線上被壓縮到幾乎消失，但恰恰是深度學習對話中最關鍵的觸發器。",
m4_p4:"教室應該變成三件事：一、高密度碰撞的競技場——學習者帶著各自 SDL 和 AI 探索的成果來過招，不是聽老師講。每次離開教室你的認知結構應該被重組。二、關係與信任的培養皿——跟見過面一起吃過飯的人線上討論深度完全不同。三、反思與意義建構的聖殿——在高速運轉的循環中定期停下來問：我們到底學到了什麼？這對我們意味著什麼？教室從「學習的主場」降級為「學習生態系的節點」——出場頻率降低，每次份量加重。",
m4_p5:"校園從「教育的預設容器」變成「教育的選配模組」。Agentic AI + 線上學習 + 場域實踐構成基礎架構。校園體驗變成可選擇的附加層——為需要通過儀式、社群歸屬、身份轉化的學習者服務。有些人選完整校園體驗（十八歲離開家、跟陌生人共同生活、經歷第一次獨立），有些人選純線上加場域路徑。兩條路通向同樣被認證的學習成果。教育的未來不是「有校園」或「沒校園」，而是「不再預設每個人都需要校園」。校園可能一學期只見面六次，但每一次都是不可取代的高峰體驗。",
m4_cards:[

// M5
m5_nav:"5. 教授與年輕人",m5_title:"大學教授與年輕人的希望",
m5_p1:"大學教授的三重角色——教學者、研究者、導師——在 AI 時代面臨全面解構。教學者角色最先被取代：AI 在知識傳遞上更有耐心、更能客製化、24 小時在線、能即時調整難度、用學生最能理解的方式重新解釋五十次不會不耐煩。過去教授的稀缺性在於他是學生能接觸到的少數精通該領域的人，但當 AI 能以接近專家水準回答任何領域問題，這種稀缺性就被稀釋了。一位普通教授照本宣科的講課，邊際價值已趨近於零。",
m5_p2:"「Agentic AI 能自動完成從問題發掘、文獻回顧、假說生成、研究設計、數據蒐集分析、論文撰寫、投稿應對到被接受刊登的全流程——而且根本查不出來。Agent 分階段工作，留下看起來像人類思考過程的痕跡——email 往來、文獻紀錄、數據檔案、修改歷程——全部掛在教授名下。從外部觀察，這跟教授親自做的研究完全一樣。能做出不被 AI 取代之研究的教授有 1% 嗎？我懷疑。」",
m5_p3:"學術界大量研究是增量式填坑工作——在既有架構裡微調變項、換樣本、複製研究。AI 不但能做，做得更有效率。真正重要的突破是「掀桌子」——質疑架構本身，但這樣的教授可能遠低於 1%。更致命的是：當 Agentic AI 滿足學術遊戲規則的所有要求，教授的研究動機會崩塌——不是因為他們不好，是因為制度誘因讓「自己做研究」變成不理性選擇。Publish or perish 壓力下，能外包的苦差事為什麼要自己扛？",
m5_p4:"大學教授根本沒有諮商輔導的專業訓練與能力。做研究求發表加上教學行政負擔，期待他們擔任比 AI Agent 更有觀察力、同理心、問題解決能力的導師？緣木求魚。更何況有 Physical AI——有實體存在的 AI 機器人，能感知你的表情肢體語言、能在你哭的時候遞上紙巾、受過所有心理諮商流派訓練、24 小時可用、記住你每一句話和每次情緒波動。一個始終在場、永遠不累、專業頂尖的 Physical AI 導師，對上一個忙著趕論文、一個月見你十五分鐘、沒受過諮商訓練的真人教授——多數學生會選誰？Physical AI 還解決規模化問題：每個學生都有專屬頂級導師，這是教育公平的根本性躍進。",
m5_p5:"學術體制面臨三條演化路徑。路徑一（全面崩塌）：所有人偷偷用 Agent，論文暴增但沒人在思考，同儕審查變成 AI 寫的論文被 AI 審查再被 AI 刊登——機器寫給機器看。路徑二（重新定義）：承認 AI 能做研究，把人類價值定義為提出 AI 想不到的問題和承擔倫理責任。路徑三（改變規則）：放棄偵測，徹底改變學術評價體系——不再以論文評價人，而是以 AI 無法代勞的方式衡量貢獻。判斷是路徑一先發生，逼出路徑三。「發表論文」會失去能力信號功能——如果每個人都能買假名牌包，名牌包就不再是身份象徵。",
m5_p6:"但教授時代落幕不是年輕人的末日，而是破曉。教授的困境是「既有價值被掏空」——護城河被 AI 削平。大學生的處境完全相反：「從零開始，起跑線前所未有地公平」。年輕人是第一代 AI 原住民，不需要「適應」AI。過去做獨立研究需要四年大學加三到五年研究所再熬資歷，現在一個有好奇心、有好問題、會使用 AI 的二十歲年輕人今天就可以開始。真正的希望在三個面向：一、你們是第一代 AI 原住民，沒有舊遊戲的肌肉記憶拖後腿。二、AI 取代的是可系統化能力，而好奇心、跨域直覺、意義渴望、行動勇氣——二十歲的人比五十歲的人通常擁有更多。三、一個會問問題的人在任何時代都有希望，AI 時代這種人的槓桿被放大一千倍。",

m1_nav:"1. Learning Methods",m1_title:"The Learning Methods Showdown",
m1_p1:"Education begins with an ancient question: 'Do you want me to give you a fish, or teach you to fish?' Give someone a fish and they eat for a day; teach them to fish and they eat for a lifetime. In the AI era, the answer goes further — AI gives you a fish while teaching you to fish, even redesigning the fishing system. This leads to four key comparisons: SDL vs TBL, PBL vs PjBL — not either-or, but understanding each role to combine into a dynamic learning system.",
m1_p2:"\"SDL is the engine, TBL is the accelerator. Someone without SDL entering TBL becomes a free rider — relying on others, copying answers, appearing to participate but learning nothing. Conversely, SDL alone easily falls into the echo chamber of cognitive blind spots — you think you understand, but you're spinning in your own framework. The team's value: exposing your blind spots when perspectives clash.\"",
m1_p3:"PBL (Problem-Based Learning) is like a doctor diagnosing — methodically finding root causes through complex symptoms. Originating in medical education, the process IS the learning. PjBL (Project-Based Learning) is like an architect building — delivering a tangible structure, learning through construction. The strongest design ignites inquiry through PBL (real problems spark motivation), then grounds it through PjBL (transforming inquiry into concrete deliverables).",
m1_p4:"SDL and TBL form a reinforcing cycle: self-study → team collision → discover gaps → more self-study → team validation. Faster cycle = deeper learning. TBL's first step is an individual quiz testing SDL quality — SDL is TBL's prerequisite. Strong SDL means growth even without a team; no SDL in the best team means just filling a seat.",
m1_p5:"Is using AI more important than building AI apps? For most people, using matters far more. Not everyone needs to be an AI engineer, but nearly everyone will collaborate with AI. The boundary between building and using is blurring. The core competency is questioning and judgment. The pragmatic path: master using first, then naturally want to build. Using is the foundation; building creates a multiplier effect — solving not just your own problems but building solutions for many.",
m1_cards:[
{title:"SDL: Self-Directed Learning",desc:"Learners set their own goals, plan pathways, find resources, monitor progress, and reflect. The core is personal learning sovereignty."},
{title:"TBL: Team-Based Learning",desc:"Deepen understanding through teamwork: pre-class preparation → individual test → team test → application. The core is knowledge construction through social collision."},
{title:"PBL: Problem-Based",desc:"Present learners with real, complex, open-ended problems. They discover what they need to learn through the problem-solving process."},
{title:"PjBL: Project-Based",desc:"Complete a project with a clear deliverable — a product, report, prototype, or presentation. Learning happens in the making."}
],
m1_terms:[
{front:"SDL",back:"Self-Directed Learning: A learning model where learners autonomously set goals, plan paths, monitor progress, and reflect on their growth."},
{front:"TBL",back:"Team-Based Learning: Through pre-class prep, individual/team quizzes, and application exercises, understanding deepens via team collision."},
{front:"PBL vs PjBL",back:"Problem-Based vs Project-Based: PBL focuses on inquiry (like diagnosis), PjBL on deliverables (like construction). Best design combines both."}
],
m1_q:[
{q:"What role does SDL play in TBL?",opts:["Accelerator","Engine","Brake","Decoration"],ans:"UFxOQRMUFRwXAQ==",exp:"SDL is the engine providing individual learning drive; TBL is the accelerator amplifying learning through team collision."},
{q:"What happens to someone without SDL capacity in TBL?",opts:["Becomes a leader","Becomes a free rider","Automatically learns","Drops out"],ans:"UFxOQRMUFRwXAQ==",exp:"Without self-directed learning foundations, one can only rely on others in the team, becoming a free rider."},
{q:"PBL is most like which role?",opts:["Architect","Doctor","Chef","Athlete"],ans:"UFxOQRMUFRwXAQ==",exp:"PBL is like a doctor diagnosing — facing complex symptoms, methodically finding root causes, focusing on the inquiry process."},
{q:"What is the core feature of PjBL?",opts:["No standard answers","Clear deliverables","Pure theory","Individual work only"],ans:"UFxOQRMUFRwXAQ==",exp:"PjBL requires learners to produce tangible outputs — products, reports, prototypes, etc."},
{q:"What is the optimal SDL-TBL relationship?",opts:["Either-or","TBL replaces SDL","Complementary cycle","Completely independent"],ans:"UFxOQRMUFRwXAg==",exp:"Self-study → team collision → discover gaps → more self-study → team validation — a reinforcing cycle."},
{q:"What is the strongest learning design?",opts:["Pure PBL","Pure PjBL","PBL ignition + PjBL grounding","Abandon both"],ans:"UFxOQRMUFRwXAg==",exp:"Use PBL's problem-driven approach to ignite inquiry, then PjBL's project framework to ground results into concrete outputs."},
{q:"What is typically the first step in TBL?",opts:["Team discussion","Individual quiz","Lecture","Group presentation"],ans:"UFxOQRMUFRwXAQ==",exp:"TBL begins with individual quizzes to verify each person's pre-class SDL quality before team discussion."},
{q:"What drives the SDL + TBL cycle?",opts:["Exam pressure","Cognitive conflict","Teacher demands","Credit requirements"],ans:"UFxOQRMUFRwXAQ==",exp:"Clashing perspectives in teams create cognitive conflict, forcing you to re-examine understanding and driving deeper self-study."}
],

m2_nav:"2. Venues & Experiences",m2_title:"Teaching Venues & Life Experiences",
m2_p1:"Learning happens in specific venues. The Flipped Classroom reverses traditional 'lecture + homework' — students self-study beforehand, class time is for discussion, practice, application. The essence: redistributing time for higher-order interaction. Traditional classrooms' biggest waste: teachers lecture what students could learn independently while higher-order thinking needing guidance gets squeezed to homework.",
m2_p2:"\"The flipped classroom optimizes a swimming pool — watch tutorial videos first, then practice with coach giving real-time guidance. Field practicum throws you into the ocean — waves, currents, temperature are variables the pool can't simulate. Tell me and I forget, show me and I remember, involve me and I understand. Field practicum is the most thorough involvement.\"",
m2_p3:"Field Practicum places learners in real work environments — hospitals, schools, companies, communities. No classroom, however flipped, can simulate real-world complexity, uncertainty, interpersonal dynamics, and emotional pressure. It solves the knowing-doing gap — transforming 'knowing' into 'doing.' Flipped and field are upstream-downstream: flipping is optimized preparation; fieldwork is irreplaceable combat.",
m2_p4:"Internships vertically deepen expertise — building industry skills, networks, testing career fit. You learn not just skills but an industry's internal logic: office politics, client management, deadlines with real consequences. Exchange study horizontally broadens worldview — when everything familiar stops working (language, food, norms, humor), you rebuild assumptions from scratch. This cognitive restructuring stays for life.",
m2_p5:"Ideal path: exchange first to open perspectives, build adaptability, sharpen language; then internship leveraging international experience. Exchange gives you the lens to see a broader world; internship gives leverage for career opportunities. This spectrum forms a complete journey: flipped classroom optimizes learning efficiency; field practicum tests knowledge against reality; internship forges professional identity; exchange restructures cognitive frameworks — a growth path from classroom to world.",
m2_cards:[
{title:"Flipped Classroom",desc:"Self-study content before class through videos/materials; class time is for discussion, practice, and application. Essentially redistributing class time for higher-order interaction."},
{title:"Field Practicum",desc:"Enter real work environments — hospitals, schools, companies, communities. Operate, observe, and reflect in authentic contexts where knowledge meets reality."},
{title:"Internship",desc:"Real work in professional settings, building industry skills, developing networks, and testing career fit. Core gain: professional identity and practical competence."},
{title:"Exchange Study",desc:"Learn in different academic and cultural environments, rebuild assumptions, develop cross-cultural adaptability. Core gain: broadened perspective and cultural intelligence."}
],
m2_terms:[
{front:"Flipped Classroom",back:"Reverses 'lecture in class + practice at home': self-study knowledge beforehand, use class time for higher-order application and discussion."},
{front:"Field Practicum",back:"Placing learners in real-world work settings to operate, observe, and reflect in authentic contexts. The most thorough form of 'involve me.'"},
{front:"Vertical vs Horizontal",back:"Internships deepen expertise vertically; exchange broadens worldview horizontally. Complementary: exchange = lens, internship = leverage."}
],
m2_q:[
{q:"What is the essence of the flipped classroom?",opts:["Eliminate classes","Redistribute class time","Let students self-study only","Reduce teacher workload"],ans:"UFxOQRMUFRwXAQ==",exp:"The core of flipping is shifting precious face-to-face time from low-level knowledge delivery to high-level discussion and application."},
{q:"What core problem does field practicum solve?",opts:["Class efficiency","The knowing-doing gap","Exam pressure","Teacher burden"],ans:"UFxOQRMUFRwXAQ==",exp:"No matter how good the classroom, it's simulated. Field practicum lets learners face real-world complexity, converting 'knowing' to 'doing.'"},
{q:"What is the relationship between flipped classroom and field practicum?",opts:["They replace each other","Upstream-downstream","Completely unrelated","Either-or"],ans:"UFxOQRMUFRwXAQ==",exp:"Flipped classroom is optimized preparation; field practicum is irreplaceable real combat — upstream and downstream."},
{q:"What is the core gain of internship?",opts:["Cultural perspective","Professional identity & practical competence","Language skills","Academic papers"],ans:"UFxOQRMUFRwXAQ==",exp:"Internship builds industry skills, networks, and career direction testing in real professional environments."},
{q:"What is the unique value of exchange study?",opts:["Credit transfer","Rebuilding assumptions & cross-cultural adaptability","Higher GPA","Escaping pressure"],ans:"UFxOQRMUFRwXAQ==",exp:"When everything familiar suddenly doesn't work, you're forced to rebuild assumptions from scratch — exchange's unique cognitive restructuring."},
{q:"What is the ideal sequence of experiences?",opts:["Internship then exchange","Exchange then internship","Internship only","Exchange only"],ans:"UFxOQRMUFRwXAQ==",exp:"Exchange first opens perspectives and adaptability; then internship leverages that international experience. Lens first, leverage second."},
{q:"Field practicum can be compared to?",opts:["Practicing in a pool","Being thrown into the ocean","Reading on shore","Watching swimming videos"],ans:"UFxOQRMUFRwXAQ==",exp:"The pool (flipped classroom) optimizes practice, but the ocean (field practicum) has waves, currents, and real-world variables."},
{q:"Which quote best represents field practicum?",opts:["Tell me and I forget","Show me and I remember","Involve me and I understand","Test me and I pass"],ans:"UFxOQRMUFRwXAg==",exp:"'Involve me and I understand' — field practicum is the most thorough involvement, understanding through participation."}
],

m3_nav:"3. Teaching & AI",m3_title:"Teaching Responsibility & AI Integration",
m3_p1:"Innovative teaching vs solid teaching — which matters more? For most teachers, mastering basics matters far more. Innovation doesn't equal effectiveness — many innovations produce fanfare but students fail basic concepts. That's replacing content with form. Solid teaching is itself sophisticated expertise — clear lectures reaching different levels, precise assessment. Innovation requires solid foundations — you must know what to teach before discussing different methods.",
m3_p2:"\"Innovation's proper positioning is an upgrade of 'teaching well,' not a replacement. A teacher who can't cover basics but rushes into flipping and PBL is building castles on sand. Students need clear, solid teachers — not trendy methods with hollow content. Master basics first, then innovate — this sequence cannot be reversed.\"",
m3_p3:"Traditional methods (flipped, PBL, TBL, PjBL, cooperative learning, differentiated instruction, scaffolding) form the teaching 'operating system' — underlying logic from decades of cognitive science: why problem-driven? Why self-study before discussion? These principles don't become obsolete because AI appeared. Human knowledge construction hasn't changed.",
m3_p4:"AI is powerful new 'hardware' unlocking new possibilities. SDL + AI: real-time dialogue and customized explanations beyond passive videos. TBL + AI: debate with AI before team discussion; AI as third-party perspective breaking groupthink. PBL + AI: rapid data gathering, hypothesis generation, solution simulation. Flipped + AI: pre-class instant Q&A, in-class real-time diagnostics for each student.",
m3_p5:"But AI without pedagogical foundations is dangerous. Telling students to 'ask ChatGPT and submit a report' without understanding PBL isn't AI integration — it's outsourcing teaching. Not understanding scaffolding means not knowing when students should struggle vs receive support. Traditional methods are roots, AI is wings. Unstable roots make wings dangerous; deep roots let wings carry you to unreachable heights. Master basics, then innovate — more critical than ever in the AI era.",
m3_cards:[
{title:"SDL + AI",desc:"AI companions dramatically boost self-study efficiency and depth — real-time dialogue, follow-up questions, customized explanations, far beyond watching videos alone."},
{title:"TBL + AI",desc:"Debate your viewpoints with AI before team discussions, bringing more refined ideas. AI also serves as a third-party perspective provider, breaking groupthink."},
{title:"PBL + AI",desc:"AI helps students rapidly gather data, generate hypotheses, and simulate solutions, freeing time for higher-order analysis and judgment."},
{title:"Flipped + AI",desc:"AI provides instant Q&A during pre-class self-study; in class, AI enables real-time understanding diagnostics for true differentiated instruction."}
],
m3_terms:[
{front:"Teaching OS",back:"Traditional innovative methods (flipping, PBL, TBL, PjBL) provide the underlying logic of learning design — why problem-driven? Why self-study before discussion?"},
{front:"AI = New Hardware",back:"AI upgrades every teaching method: SDL gets AI companions, TBL gets AI debate partners, PBL gets AI research assistants, flipping gets AI diagnostics."},
{front:"Roots & Wings",back:"Traditional methods are roots, AI is wings. AI integration without pedagogical foundations just outsources teaching to AI — not real innovation."}
],
m3_q:[
{q:"What is innovation's proper positioning?",opts:["Replace traditional teaching","An upgrade of teaching well","Pure formal change","Extra burden"],ans:"UFxOQRMUFRwXAQ==",exp:"Innovation is built on solid teaching foundations as an upgrade, not a replacement. Build on sand and it collapses."},
{q:"AI integration without pedagogical foundations becomes?",opts:["True innovation","Outsourcing teaching to AI","Differentiated instruction","Flipped classroom"],ans:"UFxOQRMUFRwXAQ==",exp:"Telling students to 'ask AI and submit a report' without understanding PBL design teaches copy-paste, not knowledge."},
{q:"Traditional innovative methods are metaphorically called?",opts:["Wings","Engine","Operating system","Hardware"],ans:"UFxOQRMUFRwXAg==",exp:"Traditional methods are the teaching OS providing underlying logic; AI is new hardware providing execution capability."},
{q:"What is AI's value in TBL?",opts:["Replace team discussion","Third-party perspective provider","Students skip preparation","Reduce interaction"],ans:"UFxOQRMUFRwXAQ==",exp:"AI helps individuals sharpen viewpoints before discussion and provides third-party perspectives to break groupthink."},
{q:"Why master basics first?",opts:["Innovation doesn't matter","Solid teaching itself is sophisticated expertise","Students don't need innovation","Administrative requirement"],ans:"UFxOQRMUFRwXAQ==",exp:"Clear lectures, reaching all levels of students, precise assessment — these fundamentals at their best are sophisticated expertise."},
{q:"AI's key breakthrough in SDL is?",opts:["Replace teachers","Always-available AI companion for dialogue","Auto-complete homework","No learning needed"],ans:"UFxOQRMUFRwXAQ==",exp:"AI companions transform self-study from passive video watching to interactive dialogue with real-time follow-up and customized explanations."},
{q:"'Building castles on sand' refers to?",opts:["Solid foundation before innovation","No foundation needed","Innovation is most important","Abandon teaching"],ans:"UFxOQRMUFRwXAA==",exp:"Rushing into innovative methods without mastering basics is like building castles on sand — the foundation is unstable."},
{q:"The correct roots-and-wings combination is?",opts:["Wings only","Roots only","Deep roots then grow wings","Neither needed"],ans:"UFxOQRMUFRwXAg==",exp:"With deep roots in traditional methods, AI wings can carry you to places previously unreachable."}
],

m4_nav:"4. Future of Campus",m4_title:"The Future of Campus & Classroom",
m4_p1:"EMI (English as Medium of Instruction) means teachers use English for subject content. EML (English as Medium of Learning) flips to the student: how learners construct knowledge through English. EMI without EML awareness becomes a one-person English show. The ideal: EML-oriented EMI design — teaching in English while ensuring students truly learn through English.",
m4_p2:"\"Once AI integrates into EML, EMI shifts from 'necessity' to 'luxury.' AI opens other EML channels — students build English learning environments through AI, no longer fully dependent on English instruction. Invest in ensuring every student can EML (AI lowers the barrier), not requiring every teacher to EMI (forced English may sacrifice subject depth). High-quality EMI remains premium but no longer mandatory standard.\"",
m4_p3:"With the full system assembled (PBL inquiry + PjBL output + AI-empowered SDL + online TBL + field practicum), classroom functions are replaced one by one. But one function remains a structural gap: 'ritual co-presence.' Physical co-presence creates learning tension online can't replicate — the cognitive conflict from someone's frown, a glance, a sigh, a silence. These micro-signals compress to near-zero online yet are the most critical deep-learning triggers.",
m4_p4:"The classroom should become three things: First, an arena for high-density collision — learners spar with their SDL and AI exploration results, not listen to lectures. Second, a petri dish for relationships and trust — online discussion with people you've met and shared meals with reaches completely different depths. Third, a sanctuary for reflection — periodically stop and ask: what have we learned? What does it mean? The classroom downgrades from main venue to ecosystem node — less frequent, far heavier.",
m4_p5:"Campus shifts from 'default container' to 'optional module.' Agentic AI + online learning + field practice form decentralized base infrastructure. Campus becomes optional for those needing rites of passage, community belonging, identity transformation. Some choose full campus experience (leaving home at eighteen, living with strangers, first independence); others choose online + field paths. Both lead to certified outcomes. The future isn't 'campus or no campus' but 'no longer assuming everyone needs campus.' Perhaps six times per semester, each an irreplaceable peak experience.",
m4_cards:[
{title:"EMI → EML Flip",desc:"EMI is means (teachers use English to teach), EML is purpose (students learn through English). AI decouples EML from EMI dependence."},
{title:"Classroom's Three New Functions",desc:"Arena for high-density collision, petri dish for relationships and trust, sanctuary for reflection and meaning-making. Less frequent, more impactful."},
{title:"Campus = Optional Module",desc:"Agentic AI + online learning + field practice form the base infrastructure. Campus experience becomes an optional add-on layer, no longer mandatory."},
{title:"Ritual Co-presence",desc:"Regular physical gatherings provide shared memory and community identity. Not a question of learning efficiency, but of existential meaning."}
],
m4_terms:[
{front:"EMI vs EML",back:"EMI = English as Medium of Instruction (means); EML = English as Medium of Learning (purpose). AI decouples the two."},
{front:"Optional Module",back:"Campus shifts from a mandatory 'default container' for everyone to an elective 'add-on module' based on individual needs. Both paths lead to certified outcomes."},
{front:"Ritual Co-presence",back:"The learning tension, community belonging, and collective reflection created by physical co-presence — an existential experience that cannot be fully replicated online."}
],
m4_q:[
{q:"After AI integrates into EML, EMI becomes?",opts:["More important","Shifts from necessity to luxury","Completely disappears","Unaffected"],ans:"UFxOQRMUFRwXAQ==",exp:"AI enables students to autonomously build English learning environments; EMI is no longer the only channel for EML."},
{q:"The classroom's future role in education is?",opts:["The main venue","A node in the learning ecosystem","Completely gone","Unchanged"],ans:"UFxOQRMUFRwXAQ==",exp:"Classroom downgrades from main venue to node — less frequent but heavier: collision, belonging, reflection."},
{q:"'Ritual co-presence' in the classroom means?",opts:["Attendance checking","Community identity through physical co-presence","Exam system","Graduation ceremony"],ans:"UFxOQRMUFRwXAQ==",exp:"Shared physical space creates eye contact, sighs, silence — micro-signals that online environments compress to near-zero."},
{q:"Campus becoming an 'optional module' means?",opts:["Nobody needs campus","Campus is no longer everyone's mandatory path","Campus becomes more important","No change"],ans:"UFxOQRMUFRwXAQ==",exp:"Some choose full campus experience, others choose online + field paths. Both lead to equally certified learning outcomes."},
{q:"The base infrastructure of future education is?",opts:["Traditional campus","Agentic AI + online learning + field practice","Classroom only","Internship only"],ans:"UFxOQRMUFRwXAQ==",exp:"Decentralized system becomes base infrastructure; campus experience becomes the optional add-on layer."},
{q:"In what aspect does EMI retain value?",opts:["Knowledge delivery","Live academic English demonstration & identity modeling","Exam needs","Administrative rules"],ans:"UFxOQRMUFRwXAQ==",exp:"Professors demonstrating real-time English argumentation provide academic identity models that AI currently cannot."},
{q:"Where should effort be invested more effectively?",opts:["Requiring every teacher to EMI","Ensuring every student can EML","Cancel English teaching","Teach only in Chinese"],ans:"UFxOQRMUFRwXAQ==",exp:"Enabling every student to learn through English via AI and other channels is more effective and equitable than forcing EMI on every teacher."},
{q:"Each campus gathering, though rare, should be?",opts:["Routine","An irreplaceable peak experience","Pure socializing","Administrative need"],ans:"UFxOQRMUFRwXAQ==",exp:"Each physical gathering is a peak experience of high-density collision, trust-building, and collective reflection."}
],

m5_nav:"5. Professors & Youth",m5_title:"Professors & Young People's Hope",
m5_p1:"Professors' three roles — teacher, researcher, mentor — face total AI-era deconstruction. The teacher role falls first: AI delivers knowledge more patiently, customizably, 24/7, re-explaining fifty times without frustration. Professors' former scarcity — being among few accessible domain experts — dissolves when AI approaches expert-level answers in any field. An average scripted lecture has marginal value approaching zero.",
m5_p2:"\"Agentic AI can complete the full pipeline — problem discovery, literature review, hypothesis, research design, data analysis, writing, submission to acceptance — and it's undetectable. The Agent works in stages, leaving traces that look like human thought: emails, reading notes, data files, revision histories — all under the professor's name and account. From outside, indistinguishable from professor-conducted research. Do even 1% produce irreplaceable research? I doubt it.\"",
m5_p3:"Most academic research is incremental gap-filling — tweaking variables within existing frameworks. AI does this more efficiently. True breakthroughs 'flip the table' by questioning frameworks entirely, but such professors may be far below 1%. More devastating: when Agentic AI meets all academic game rules, research motivation collapses — incentive structures make self-research irrational. Under publish-or-perish, why carry a burden you can outsource?",
m5_p4:"Professors lack counseling training. Under publishing, teaching, and administrative pressure, expecting them to mentor better than AI Agents is asking a tree to yield fish. Physical AI — embodied robots sensing expressions and body language, handing tissues when you cry, trained in all counseling schools, available 24/7, remembering every word and emotion — provides what most professors cannot. An always-present, tireless, top-capability Physical AI mentor versus a paper-chasing professor with fifteen minutes monthly and no counseling training — most students' choice is clear. Physical AI also solves scalability: every student gets a dedicated top-quality mentor — a fundamental leap in educational equity.",
m5_p5:"Academia faces three paths. Path 1 (collapse): everyone secretly uses Agents, papers explode but nobody thinks, peer review becomes AI writing reviewed by AI published by AI — machines writing for machines. Path 2 (redefine): acknowledge AI can research, redefine human value as asking questions AI can't conceive. Path 3 (change rules): abandon detection, completely change evaluation — judge by contributions AI can't fake. Path 1 happens first, forcing Path 3. 'Publishing papers' loses its capability-signal function — like luxury brands losing status if everyone could buy counterfeits.",
m5_p6:"But professors' era ending isn't young people's doom — it's their dawn. Professors' plight: existing value hollowed out, moats flattened. Students' situation is opposite: starting from zero on an unprecedentedly level field. Young people are first AI natives — no adaptation needed, AI is native tool. Previously, independent research required years of degrees and credentials. Now, a curious twenty-year-old with good questions and AI skills can begin today. Hope in three dimensions: first, you're AI natives without old-game muscle memory. Second, AI replaces systematizable abilities while curiosity, cross-domain intuition, meaning-seeking, and courage are more abundant in youth. Third, a person who asks good questions has hope in any era — in the AI era, their leverage is multiplied a thousandfold.",
m5_cards:[
{title:"Researcher Role Collapse",desc:"Agentic AI's fully automated research pipeline — from literature review to publication acceptance — is virtually undetectable. Academic integrity's foundation is crumbling."},
{title:"Mentor Role Breach",desc:"Physical AI provides embodied presence, infinite patience, and professional counseling skills. Functionally may surpass most professors who lack counseling training."},
{title:"Three Paths for Academia",desc:"Total collapse (AI writes for AI to read) → Redefine 'research' → Abandon detection, change game rules. Path 1 happens first, forcing Path 3."},
{title:"Young People's Dawn",desc:"AI natives, no legacy baggage, unprecedentedly level playing field. Core abilities: autonomous questioning × systematic inquiry × AI collaboration × genuine care."}
],
m5_terms:[
{front:"Agentic AI",back:"AI with autonomous agency that independently completes the full research pipeline from discovery through publication, virtually undetectable in its outputs."},
{front:"Physical AI",back:"Embodied AI robots that sense facial expressions and body language, provide warm interaction, possess professional counseling skills, solving scalable 'existential companionship.'"},
{front:"AI Natives",back:"First generation growing up with AI as native tools. No need to 'adapt' to AI. Core advantages: curiosity, cross-domain intuition, meaning-seeking, courage to act."}
],
m5_q:[
{q:"Which professor role is replaced by AI first?",opts:["Researcher","Teacher","Mentor","Administrator"],ans:"UFxOQRMUFRwXAQ==",exp:"AI is more patient, more customizable, available 24/7 in knowledge delivery — the teacher role falls first."},
{q:"Why is Agentic AI research virtually undetectable?",opts:["AI confesses","Leaves obvious traces","Simulates all human research behaviors","Can only write short papers"],ans:"UFxOQRMUFRwXAg==",exp:"The agent works in stages, leaving digital footprints that look like human thought processes, statistically indistinguishable."},
{q:"When AI meets all academic game rules, professors' research motivation will?",opts:["Strengthen","Collapse","Stay unchanged","Shift to teaching"],ans:"UFxOQRMUFRwXAQ==",exp:"Incentive structures make 'doing research yourself' irrational. Why carry a burden you can outsource?"},
{q:"Physical AI's structural advantage in mentorship is?",opts:["Has a degree","Scalable high-quality companionship","Has publications","Has authority"],ans:"UFxOQRMUFRwXAQ==",exp:"Every student can have a dedicated, top-quality Physical AI mentor — a fundamental leap in educational equity."},
{q:"The most likely evolution path for academia is?",opts:["Status quo","Path 1 (collapse) first, forcing Path 3","Direct Path 2","Return to tradition"],ans:"UFxOQRMUFRwXAQ==",exp:"Short-term gray areas everywhere, collective pretense self-destructs, forcing new evaluation standards AI cannot fake."},
{q:"Young people's core advantage is?",opts:["Credentials","AI natives with no legacy baggage","Professor protection","Institutional guarantees"],ans:"UFxOQRMUFRwXAQ==",exp:"No old habits to break, no old identities to defend — first generation able to use AI from age 20 for what previously required entire teams."},
{q:"The most valuable skill combination in the AI era is?",opts:["Memorization","Autonomous questioning × systematic inquiry × AI collaboration","Test-taking skills","Following instructions"],ans:"UFxOQRMUFRwXAQ==",exp:"A person who asks good questions has hope in any era; in the AI era, their leverage is multiplied a thousandfold."},
{q:"The fall of the professor era means for young people?",opts:["Doom","Dawn","No impact","More need for professors"],ans:"UFxOQRMUFRwXAQ==",exp:"Old knowledge monopolies break down; young people and veterans stand on nearly the same starting line — and youth may run faster."}
],

const FlipCard=({front,back,t})=>{
  const[flipped,setFlipped]=useState(false);
  return(
    <div className="perspective cursor-pointer h-36" onClick={()=>setFlipped(!flipped)}>
      <div className={`transform-style-3d relative w-full h-full transition-transform duration-500 ${flipped?'rotate-y-180':''}`}>
        <div className="backface-hidden absolute inset-0 bg-white dark:bg-slate-800 rounded-xl p-4 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 shadow-sm">
          <p className="font-serif font-bold text-center text-[#004030] dark:text-[#D8C3A5]">{front}</p>
          <p className="text-xs text-slate-400 mt-2">{t.flip_prompt}</p>
        </div>
        <div className="backface-hidden rotate-y-180 absolute inset-0 bg-[#004030] dark:bg-slate-700 rounded-xl p-4 flex items-center justify-center">
          <p className="text-sm text-center text-[#D8C3A5] dark:text-slate-200 leading-relaxed">{back}</p>
        </div>
      </div>
    </div>
  );
};

const ModuleQuiz=({questions,t,moduleId,onQuizSubmit,onRetry,mastered=[]})=>{
  const totalQ=questions.length;
  const[selected,setSelected]=useState({});
  const[submitted,setSubmitted]=useState(false);
  const remaining=React.useMemo(()=>[...Array(totalQ).keys()].filter(i=>!mastered.includes(i)),[mastered,totalQ]);
  const[quizData]=useState(()=>{
    const pool=[...remaining].sort(()=>Math.random()-0.5).slice(0,Math.min(4,remaining.length));
    return pool.map(qIdx=>{
      const q=questions[qIdx];const ci=_d(q.ans);
      const{shuffledOpts,newCorrectIdx}=shuffleOptions(q.opts,ci);
      return{qIdx,q:q.q,opts:shuffledOpts,ans:newCorrectIdx,exp:q.exp};
    });
  });
  const score=submitted?quizData.filter((d,i)=>selected[i]===d.ans).length:0;
  const allDone=remaining.length===0;
  if(allDone)return(<div className="mt-8 bg-green-50 dark:bg-green-900/20 rounded-2xl p-6 border border-green-300 dark:border-green-700 text-center"><p className="text-lg font-bold text-green-700 dark:text-green-300">{t.quiz_all_mastered}</p><p className="text-sm text-green-600 dark:text-green-400 mt-2">{mastered.length}/{totalQ}</p></div>);
  const titleText=t.quiz_title_fn?t.quiz_title_fn(quizData.length,totalQ,mastered.length):t.quiz_title;
  return(
    <div className="mt-8 bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-6 border border-slate-200 dark:border-slate-700">
      <h3 className="text-lg font-bold font-serif text-[#004030] dark:text-[#D8C3A5] mb-6">{titleText}</h3>
      {quizData.map((d,i)=>(
        <div key={d.qIdx} className="mb-6">
          <p className="font-bold mb-3">{i+1}. {d.q}</p>
          <div className="space-y-2">{d.opts.map((opt,j)=>(
            <button key={j} onClick={()=>!submitted&&setSelected(s=>({...s,[i]:j}))}
              className={`w-full text-left px-4 py-3 rounded-lg border transition-all text-sm

function App(){
  const[lang,setLang]=useState('zh');
  const[isDark,setIsDark]=useState(false);
  const[module,setModule]=useState(0);
  const[menuOpen,setMenuOpen]=useState(false);
  const[ttsState,setTtsState]=useState('idle');
  const[studentInfo,setStudentInfo]=useState({group:'',dept:'',id:'',name:''});
  const[analytics,setAnalytics]=useState({time:Array(TOTAL).fill(0),clicks:Array(TOTAL).fill(0),quizMastered:Array.from({length:TOTAL},()=>[]),quizAttempted:Array.from({length:TOTAL},()=>[])});
  const[quizRound,setQuizRound]=useState(Array(TOTAL).fill(0));
  const contentRef=useRef(null);
  const menuRef=useRef(null);
  const t=dict[lang];

  // Dark mode
  useEffect(()=>{isDark?document.documentElement.classList.add('dark'):document.documentElement.classList.remove('dark');},[isDark]);

  // Timer
  useEffect(()=>{const iv=setInterval(()=>{setAnalytics(a=>{const nt=[...a.time];nt[module]++;return{...a,time:nt};});},1000);return()=>clearInterval(iv);},[module]);

  // Click tracking
  const handleContentClick=()=>{setAnalytics(a=>{const nc=[...a.clicks];nc[module]++;return{...a,clicks:nc};});};

  // Quiz submit
  const handleQuizRetry=(mid)=>{setQuizRound(r=>{const n=[...r];n[mid]++;return n;});};
  const handleQuizSubmit=(mid,correctIdxs,attemptedIdxs)=>{setAnalytics(a=>{
    const qm=a.quizMastered.map(arr=>[...arr]);
    const qa=a.quizAttempted.map(arr=>[...arr]);
    correctIdxs.forEach(idx=>{if(!qm[mid].includes(idx))qm[mid].push(idx)});
    attemptedIdxs.forEach(idx=>{if(!qa[mid].includes(idx))qa[mid].push(idx)});
    return{...a,quizMastered:qm,quizAttempted:qa};
  });};

  // Menu outside click
  useEffect(()=>{if(!menuOpen)return;const h=(e)=>{if(menuRef.current&&!menuRef.current.contains(e.target))setMenuOpen(false);};document.addEventListener('mousedown',h);return()=>document.removeEventListener('mousedown',h);},[menuOpen]);

  // Module switch
  const switchModule=(m)=>{setModule(m);window.scrollTo({top:0,behavior:'smooth'});if(ttsState!=='idle'){window.speechSynthesis.cancel();setTtsState('idle');}};

  // TTS
  const handleTTS=(action)=>{
    if(!('speechSynthesis' in window))return;
    if(action==='stop'){window.speechSynthesis.cancel();setTtsState('idle');return;}
    if(action==='pause'){window.speechSynthesis.pause();setTtsState('paused');return;}
    if(action==='play'){
      if(ttsState==='paused'){window.speechSynthesis.resume();setTtsState('playing');return;}
      window.speechSynthesis.cancel();
      const sep=lang==='zh'?'。 ':'. ';
      let texts=[];
      if(module===0){texts=[t.m0_title,t.m0_intro,t.m0_why,t.m0_why_desc,...(t.m0_stats||[]).map(s=>`${s.label}: ${s.val}`),...(t.m0_modules||[]).map(m=>`${m.title}. ${m.desc}`)].filter(Boolean);}
      else if(module>=1&&module<=5){const mk=`m${module}`;texts=[t[`${mk}_title`],...[1,2,3,4,5,6,7,8].map(n=>t[`${mk}_p${n}`]).filter(Boolean),...(t[`${mk}_cards`]||[]).map(c=>`${c.title}. ${c.desc||''}`),...(t[`${mk}_terms`]||[]).flatMap(term=>[term.front,term.back]),t[`${mk}_alert`],t[`${mk}_quote`],t[`${mk}_note`]].filter(Boolean);}
      else if(module===6){texts=[t.m6_title,t.m6_desc].filter(Boolean);}
      else if(module===7){texts=[t.mlab_title,t.mlab_desc].filter(Boolean);}
      else{texts=[t.analytics_title,t.analytics_desc].filter(Boolean);}
      const text=texts.join(sep);
      const utterance=new SpeechSynthesisUtterance(text);
      utterance.rate=0.95;
      const voices=window.speechSynthesis.getVoices();
      if(lang==='zh'){const v=voices.find(v=>v.lang==='zh-TW'&&v.name.includes('Yating'))||voices.find(v=>v.lang==='zh-TW')||voices.find(v=>v.lang.startsWith('zh'));if(v)utterance.voice=v;utterance.lang='zh-TW';}
      else{const v=voices.find(v=>v.lang==='en-GB'&&(v.name.includes('Male')||v.name.includes('Daniel')))||voices.find(v=>v.lang==='en-GB')||voices.find(v=>v.lang.startsWith('en'));if(v)utterance.voice=v;utterance.lang='en-GB';}
      utterance.onend=()=>setTtsState('idle');
      utterance.onerror=()=>setTtsState('idle');
      window.speechSynthesis.speak(utterance);
      setTtsState('playing');
    }
  };

  // CSV export

            </button>
          </div>
          <div className="flex items-center gap-1 sm:gap-2">
            <div className="flex items-center gap-1 mr-1 sm:mr-2">
              {ttsState==='idle'&&<button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg" title={t.audio_read}><IconPlay size={16}/></button>}
              {ttsState==='playing'&&<><button onClick={()=>handleTTS('pause')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPause size={16}/></button><button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button></>}
              {ttsState==='paused'&&<><button onClick={()=>handleTTS('play')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconPlay size={16}/></button><button onClick={()=>handleTTS('stop')} className="p-1.5 hover:bg-white/10 rounded-lg"><IconSquare size={16}/></button></>}
            </div>
            <button onClick={()=>setLang(lang==='zh'?'en':'zh')} className="px-2 py-1 text-xs sm:text-sm font-bold border border-[#D8C3A5]/50 rounded-lg hover:bg-white/10 transition-colors">{lang==='zh'?'EN':'中'}</button>
            <button onClick={()=>setIsDark(!isDark)} className="p-1.5 sm:p-2 hover:bg-white/10 rounded-lg">{isDark?<IconSun size={18}/>:<IconMoon size={18}/>}</button>
          </div>
        </div>
      </header>

      {/* Body */}
      <div className="flex-1 flex max-w-7xl mx-auto w-full px-3 sm:px-4 lg:px-6 py-6 gap-6">
        {/* Sidebar */}
        <aside className="hidden md:block w-64 shrink-0">
          <div className="sticky top-20 space-y-1">
            {modulesList.map(m=>(
              <button key={m.id} onClick={()=>switchModule(m.id)}
                className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-all text-left
                  ${module===m.id?'bg-[#004030] text-white dark:bg-[#D8C3A5]/20 dark:text-[#D8C3A5] font-bold shadow-sm':'text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:text-[#004030] dark:hover:text-[#D8C3A5]'}`}>
                <span className={module===m.id?'text-[#D8C3A5]':'opacity-50'}>{m.icon}</span>
                <span className="truncate">{m.title}</span>
              </button>
            ))}
          </div>
        </aside>

        {/* Main */}
        <main className="flex-1 min-w-0" onClick={handleContentClick} ref={contentRef}>
          <div className="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-4 sm:p-6 md:p-8">
            {renderContent()}
          </div>
          {/* Bottom nav */}
          <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
            <button onClick={()=>switchModule(Math.max(0,module-1))} disabled={module===0}
              className="px-6 py-3 font-serif font-bold text-slate-500 hover:text-[#004030] dark:hover:text-[#D8C3A5] disabled:opacity-0 uppercase text-sm tracking-wider flex items-center">
              ← {t.nav_prev}
            </button>
            <button onClick={()=>switchModule(Math.min(TOTAL-1,module+1))} disabled={module===TOTAL-1}
              className="px-8 py-3 bg-[#004030] dark:bg-[#D8C3A5] text-white dark:text-[#004030] font-serif font-bold hover:bg-[#002b20] dark:hover:bg-white disabled:opacity-0 uppercase text-sm tracking-wider shadow-md flex items-center">
              {t.nav_next} <IconArrowRight size={16} className="ml-2"/>
            </button>
          </div>
        </main>
      </div>

      {/* Footer */}
      <footer className="h-8 bg-[#004030] flex items-center justify-between px-4 shrink-0">
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs">{t.date} · {t.copyright}</span>
        <span className="text-[#D8C3A5]/60 text-[10px] sm:text-xs flex items-center gap-3">
          <span className="flex items-center gap-1">Architect:&nbsp;<a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" rel="noopener noreferrer" className="text-[#D8C3A5] hover:text-white underline underline-offset-2 transition-colors">Prof. Shihmin Lo</a></span>
          <button onClick={()=>window.scrollTo({top:0,behavior:'smooth'})} className="text-[#D8C3A5] hover:text-white transition-colors font-bold cursor-pointer">Top ↑</button>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
